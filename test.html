<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿題用テストページ</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            padding: 20px; 
            width: 300px; 
            text-align: center; 
        }
        .profile-img { 
            width: 100px; 
            height: 100px; 
            background: #ddd; 
            border-radius: 50%; 
            margin: 0 auto 15px; 
            object-fit: cover;
            display: block;
        }
        h1 { 
            font-size: 1.5rem; 
            color: #333; 
            margin: 10px 0;
        }
        p { 
            color: #666; 
            font-size: 0.9rem; 
            line-height: 1.5;
        }
        .btn { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 10px 20px; 
            background: #007bff; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/100" alt="プロフィール画像" class="profile-img">
        <h1>ユーザー名</h1>
        <p>ここに自己紹介のテキストが入ります。HTMLの練習用サンプルです。デザインが反映されていれば成功です！</p>
        <a href="#" class="btn">フォローする</a>
    </div>

</body>
</html>
